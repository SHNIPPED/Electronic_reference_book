name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ github.repository }}/api
  IMAGE_NAME_UI: ${{ github.repository }}/ui

jobs:
  build:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./API
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${{ github.sha }}

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: ./UI/react-intro
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_UI }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_UI }}:${{ github.sha }}

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    if: always()  
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: API/package-lock.json
      - name: Install dependencies
        run: |
          cd API
          npm ci
      - name: Run tests
        run: |
          cd API
          npm test

  test-ui:
    name: Test UI (build check)
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: UI/react-intro/package-lock.json
      - name: Install dependencies
        run: |
          cd UI/react-intro
          npm ci
      - name: Build UI
        run: |
          cd UI/react-intro
          npm run build

  # ========== ДЕПЛОЙ ==========
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build, test-api, test-ui]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production 
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull images and run docker-compose
        run: |
          docker-compose -f docker-compose.yml pull
          docker-compose -f docker-compose.yml up -d
